name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  discussions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build project
        env:
          STORE_FILE: dev.p12
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "${{ secrets.STORE_FILE }}" | base64 --decode > app/dev.p12
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Prepare release assets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${GITHUB_REF_NAME}"

          # Move and rename APK:
          mv app/build/outputs/apk/release/app-release.apk "Thoth_${RELEASE_VERSION}.apk"

          # Move and rename AAB
          mv app/build/outputs/bundle/release/app-release.aab "Thoth_${RELEASE_VERSION}.aab"

          # Move mapping file
          mv app/build/outputs/mapping/release/mapping.txt ./

          # Generate SHA256SUMS
          sha256sum \
            Thoth_${RELEASE_VERSION}.apk \
            Thoth_${RELEASE_VERSION}.aab \
            mapping.txt \
            > SHA256SUMS

          # Sign SHA256SUMS
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --armor --detach-sign SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          discussion_category_name: Announcements
          files: |
            Thoth_${{ github.ref_name }}.apk
            Thoth_${{ github.ref_name }}.aab
            mapping.txt
            SHA256SUMS
            SHA256SUMS.asc